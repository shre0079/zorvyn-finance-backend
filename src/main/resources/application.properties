spring.application.name=finance-dashboard-backend

#SERVER
server.port=8080
server.servlet.context-path=/

#DATASOURCE
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_dashboard
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

#JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

#JACKSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# APPLICATION CONFIG
app.jwt.secret=bXlTdXBlclNlY3JldEtleUZvckZpbmFuY2VEYXNoYm9hcmQyMDI0IQ==
app.jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-origins[0]=http://localhost:3000
app.cors.allowed-origins[1]=http://localhost:4200
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

#ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

#LOGGING
logging.level.com.finance.dashboard=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.flywaydb=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ?? SPRING DATASOURCE (H2) ??
spring.datasource.url=jdbc:h2:mem:finance_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ?? JPA / HIBERNATE ??
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ?? FLYWAY ??
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# ?? JACKSON ??
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ?? APPLICATION CONFIG ??
app.jwt.secret=dGVzdFNlY3JldEtleUZvclVuaXRUZXN0c09ubHkxMjM0NTY=
app.jwt.expiration-ms=3600000

# ?? LOGGING ??
logging.level.com.finance.dashboard=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG